---
services:
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ../CLM-Forge:/app/CLM-Forge:ro
    environment:
      - CLM_CHECK_MODULE_PATH=/app/CLM-Forge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
