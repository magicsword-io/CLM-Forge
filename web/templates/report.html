<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CLM Forge Report — {{filename}}</title>
<style>
:root{
  --ms-green:#10B981;--ms-dark-green:#059669;--ms-orange:#D97706;--ms-yellow:#EAB308;
  --ms-red:#EF4444;--ms-purple:#A78BFA;--ms-blue:#3B82F6;--ms-teal:#14B8A6;
  --bg:#08080A;--surface:#111113;--surface-bright:#141416;--elevated:#18181B;
  --border:rgba(255,255,255,0.04);--border-hover:rgba(255,255,255,0.08);
  --text:rgba(255,255,255,0.87);--text-muted:rgba(255,255,255,0.50);--text-dim:rgba(255,255,255,0.28);
  --font-display:'Geist','Inter Tight',system-ui,sans-serif;
  --font-body:'Inter Tight',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'Geist Mono','Cascadia Code','Fira Code',Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;font-size:13px;font-weight:500}
.container{max-width:1200px;margin:0 auto;padding:32px 24px}

/* Header */
.report-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;margin-bottom:24px;position:relative;overflow:hidden}
.report-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--ms-green),var(--ms-teal),var(--ms-blue))}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
.header-left h1{font-family:var(--font-display);color:var(--ms-green);font-size:28px;font-weight:700;letter-spacing:-0.5px;line-height:1.2}
.header-left .tagline{color:var(--text-dim);font-size:13px;font-style:italic;margin-top:4px}
.header-right{text-align:right}
.header-right .version{font-size:11px;color:var(--text-dim);font-family:var(--font-mono)}
.meta-row{display:flex;gap:24px;flex-wrap:wrap;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.meta-pill{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.meta-pill strong{color:var(--text);font-weight:600}
.method-tag{font-size:11px;font-weight:600;font-family:var(--font-mono);letter-spacing:0.3px;padding:4px 10px;border-radius:6px}
.method-tag.dynamic{background:rgba(16,185,129,0.08);color:var(--ms-green);border:1px solid rgba(16,185,129,0.20)}
.method-tag.static-only{background:rgba(255,255,255,0.03);color:var(--text-dim);border:1px solid var(--border)}

/* Score ring */
.score-ring{width:90px;height:90px;position:relative}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-ring .bg{fill:none;stroke:rgba(255,255,255,0.04);stroke-width:6}
.score-ring .fg{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.6s ease}
.score-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.score-label .num{font-family:var(--font-display);font-size:24px;font-weight:700;line-height:1}
.score-label .sub{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* Summary cards */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 16px;text-align:center;transition:border-color 0.15s}
.summary-card:hover{border-color:var(--border-hover)}
.summary-card .num{font-family:var(--font-display);font-size:32px;font-weight:700;line-height:1.2;letter-spacing:-0.5px}
.summary-card .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;font-weight:600}
.c-total{color:var(--text)}.c-pass{color:var(--ms-green)}.c-critical{color:var(--ms-red)}
.c-high{color:var(--ms-orange)}.c-medium{color:var(--ms-yellow)}.c-low{color:var(--ms-blue)}

/* Section */
.section{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;overflow:hidden}
.section-header{padding:16px 24px;background:var(--surface-bright);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.section-header h2{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.2px}
.section-count{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 10px;font-size:11px;color:var(--text-dim);font-family:var(--font-mono)}
.section-body{padding:0}

/* Findings table */
table{width:100%;border-collapse:collapse}
th{background:var(--bg);padding:10px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);border-bottom:1px solid var(--border);font-weight:600}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-bright)}
.badge{display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;font-family:var(--font-mono)}
.badge.critical{background:rgba(239,68,68,0.08);color:var(--ms-red)}
.badge.high{background:rgba(217,119,6,0.08);color:var(--ms-orange)}
.badge.medium{background:rgba(234,179,8,0.08);color:var(--ms-yellow)}
.badge.low{background:rgba(59,130,246,0.08);color:var(--ms-blue)}
.badge.blocked{background:rgba(239,68,68,0.08);color:var(--ms-red)}
.badge.error{background:rgba(217,119,6,0.08);color:var(--ms-orange)}
.badge.pass{background:rgba(16,185,129,0.08);color:var(--ms-green)}
.rule-id{font-family:var(--font-mono);font-size:12px;color:var(--ms-teal);font-weight:600}
.code-snippet{font-family:var(--font-mono);font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-top:6px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;color:var(--ms-orange);max-width:500px}
.remediation{color:var(--ms-green);font-size:12px;margin-top:6px;padding:6px 12px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.12);border-radius:6px;line-height:1.5}
.remediation::before{content:'FIX: ';font-weight:700;font-family:var(--font-mono);font-size:10px;letter-spacing:0.3px}
.wdac-hint{font-size:11px;color:var(--ms-blue);margin-top:4px;padding-left:10px;border-left:2px solid rgba(59,130,246,0.15)}

/* Dynamic CLM section */
.clm-section{border-top-color:var(--ms-purple)}
.clm-section .section-header{border-left:3px solid var(--ms-purple)}
.clm-pass-box{padding:20px 24px;text-align:center;color:var(--ms-green)}
.clm-pass-box .check{font-size:36px;margin-bottom:8px}
.clm-pass-box p{font-size:13px;color:var(--text-muted)}
.gap-warning{margin:16px 24px 20px;padding:14px 18px;background:rgba(217,119,6,0.06);border:1px solid rgba(217,119,6,0.20);border-radius:8px;font-size:12px;color:var(--ms-orange);line-height:1.7}
.gap-warning strong{color:var(--ms-orange)}
.gap-warning ul{margin:8px 0 0 18px;padding:0;list-style:disc}
.gap-warning li{color:var(--text-muted);margin-bottom:2px}
.gap-warning li strong{color:var(--ms-orange)}
.gap-tip{display:block;margin-top:10px;font-weight:600;color:var(--ms-yellow)}

/* WDAC hash */
.wdac-box{padding:24px;display:flex;align-items:flex-start;gap:16px}
.wdac-icon{font-size:28px;flex-shrink:0;margin-top:2px}
.wdac-content{flex:1}
.wdac-content h3{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--ms-green);margin-bottom:4px}
.wdac-content p{font-size:12px;color:var(--text-muted);margin-bottom:10px}
.wdac-hash{font-family:var(--font-mono);font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--ms-green);word-break:break-all;user-select:all}

/* Source code */
.source-section .section-body{padding:0}
.source-code{font-family:var(--font-mono);font-size:12px;line-height:1.6;padding:16px 20px;background:var(--bg);overflow-x:auto;white-space:pre;color:var(--text-muted);counter-reset:line}
.source-line{display:block}
.source-line::before{counter-increment:line;content:counter(line);display:inline-block;width:40px;text-align:right;margin-right:16px;color:var(--text-dim);user-select:none}
.source-line.flagged{background:rgba(239,68,68,0.06);border-left:2px solid var(--ms-red);margin-left:-2px}

/* Footer */
.report-footer{text-align:center;padding:24px;color:var(--text-dim);font-size:12px;border-top:1px solid var(--border);margin-top:32px}
.report-footer a{color:var(--ms-green);text-decoration:none}

/* Print */
@media print{
  body{background:#fff;color:#000;font-size:11px}
  .container{max-width:100%;padding:16px}
  .report-header,.section,.summary-card{border-color:#ddd;background:#fff}
  .report-header::before{background:#10B981}
  .section-header{background:#f8f8f8}
  h1{color:#10B981!important}
  .num{color:#000!important}
  .num.c-critical{color:#EF4444!important}.num.c-high{color:#D97706!important}
  .num.c-medium{color:#999!important}.num.c-low{color:#3B82F6!important}
  .source-code{background:#f8f8f8;border:1px solid #ddd}
  .score-ring .bg{stroke:#eee}
  tr:hover td{background:transparent}
}
</style>
</head>
<body>
<div class="container">

<!-- Header -->
<div class="report-header">
  <div class="header-top">
    <div class="header-left">
      <h1>CLM Forge Report</h1>
      <div class="tagline">From script chaos to enforced trust.</div>
    </div>
    <div class="header-right">
      <div class="score-ring" id="score-ring"></div>
    </div>
  </div>
  <div class="meta-row">
    <div class="meta-pill"><strong>Script:</strong> <span id="meta-filename"></span></div>
    <div class="meta-pill"><strong>Lines:</strong> <span id="meta-lines"></span></div>
    <div class="meta-pill"><strong>Analyzed:</strong> <span id="meta-date"></span></div>
    <div class="meta-pill" id="meta-method"></div>
  </div>
</div>

<!-- Summary -->
<div class="summary-grid" id="summary-grid"></div>

<!-- Static Findings -->
<div class="section" id="static-section" style="display:none">
  <div class="section-header">
    <h2>Static Analysis Findings</h2>
    <span class="section-count" id="static-count"></span>
  </div>
  <div class="section-body">
    <table>
      <thead><tr><th style="width:80px">Severity</th><th style="width:90px">Rule</th><th style="width:50px">Line</th><th>Description</th><th style="width:320px">Details</th></tr></thead>
      <tbody id="static-body"></tbody>
    </table>
  </div>
</div>

<!-- Dynamic CLM -->
<div class="section clm-section" id="dynamic-section" style="display:none">
  <div class="section-header">
    <h2>Dynamic CLM Test</h2>
    <span class="section-count" id="dynamic-count"></span>
  </div>
  <div class="section-body" id="dynamic-body"></div>
</div>

<!-- WDAC Hash -->
<div class="section" id="wdac-section" style="display:none">
  <div class="section-header"><h2>WDAC Policy Hash</h2></div>
  <div class="section-body" id="wdac-body"></div>
</div>

<!-- Source Code -->
<div class="section source-section" id="source-section" style="display:none">
  <div class="section-header">
    <h2>Analyzed Source</h2>
    <span class="section-count" id="source-count"></span>
  </div>
  <div class="section-body">
    <div class="source-code" id="source-code"></div>
  </div>
</div>

<div class="report-footer">
  Generated by <strong>CLM Forge</strong> Web &mdash; <span id="footer-date"></span>
</div>
</div>

<script>
const data = {{REPORT_JSON}};
const e = s => { if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };

// Meta
document.getElementById('meta-filename').textContent = data.filename;
document.getElementById('meta-lines').textContent = data.total_lines;
const dt = data.analyzed_at ? new Date(data.analyzed_at) : new Date();
const dtStr = dt.toLocaleString('en-US', {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
document.getElementById('meta-date').textContent = dtStr;
document.getElementById('footer-date').textContent = dtStr;

const isDynamic = (data.analysis_method||'').includes('constrained_runspace');
const mp = document.getElementById('meta-method');
mp.innerHTML = isDynamic
  ? '<span class="method-tag dynamic">Static + Dynamic CLM</span>'
  : '<span class="method-tag static-only">Static Analysis Only</span>';

// Score ring
const findings = data.findings || [];
const total = findings.length;
const critical = findings.filter(f=>f.severity==='Critical').length;
const high = findings.filter(f=>f.severity==='High').length;
const medium = findings.filter(f=>f.severity==='Medium').length;
const low = findings.filter(f=>f.severity==='Low').length;
const maxScore = 100;
const deductions = critical*15 + high*8 + medium*3 + low;
const score = Math.max(0, maxScore - deductions);
const scoreColor = score >= 80 ? '#10B981' : score >= 50 ? '#D97706' : '#EF4444';
const circumference = 2 * Math.PI * 38;
const offset = circumference - (score/100) * circumference;
document.getElementById('score-ring').innerHTML = `
  <svg viewBox="0 0 90 90"><circle class="bg" cx="45" cy="45" r="38"/><circle class="fg" cx="45" cy="45" r="38" stroke="${scoreColor}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/></svg>
  <div class="score-label"><div class="num" style="color:${scoreColor}">${score}</div><div class="sub">Score</div></div>`;

// Summary cards
const med = medium;
const clm = data.clm_dynamic_results || {};
const dynBlocked = clm.blockedByCLM || 0;
const cards = [
  {label:'Findings',num:total,cls:'c-total'},
  {label:'Critical',num:critical,cls:'c-critical'},
  {label:'High',num:high,cls:'c-high'},
  {label:'Medium',num:med,cls:'c-medium'},
  {label:'Low',num:low,cls:'c-low'},
];
if(isDynamic) cards.push({label:'CLM Blocked',num:dynBlocked,cls:dynBlocked>0?'c-critical':'c-pass'});
const grid = document.getElementById('summary-grid');
cards.forEach(c => {
  const d = document.createElement('div'); d.className='summary-card';
  d.innerHTML = `<div class="num ${c.cls}">${c.num}</div><div class="label">${c.label}</div>`;
  grid.appendChild(d);
});

// Static findings table
if(total > 0) {
  document.getElementById('static-section').style.display = '';
  document.getElementById('static-count').textContent = total + ' finding' + (total!==1?'s':'');
  const sevOrder = {Critical:0,High:1,Medium:2,Low:3};
  const sorted = [...findings].sort((a,b) => (sevOrder[a.severity]??4) - (sevOrder[b.severity]??4) || a.line - b.line);
  const tbody = document.getElementById('static-body');
  sorted.forEach(f => {
    const tr = document.createElement('tr');
    let details = '';
    if(f.code_snippet) details += `<div class="code-snippet">${e(f.code_snippet)}</div>`;
    if(f.remediation) details += `<div class="remediation">${e(f.remediation)}</div>`;
    if(f.wdac_rule_hint) details += `<div class="wdac-hint">${e(f.wdac_rule_hint)}</div>`;
    tr.innerHTML = `<td><span class="badge ${f.severity.toLowerCase()}">${e(f.severity)}</span></td>`
      + `<td><span class="rule-id">${e(f.rule_id)}</span><br><span style="font-size:11px;color:var(--text-muted)">${e(f.rule_name)}</span></td>`
      + `<td style="font-family:var(--font-mono);color:var(--text-dim)">${f.line}</td>`
      + `<td>${e(f.description)}</td>`
      + `<td>${details}</td>`;
    tbody.appendChild(tr);
  });
}

// Dynamic CLM
if(isDynamic) {
  document.getElementById('dynamic-section').style.display = '';
  const dynErrors = clm.errors || [];
  const body = document.getElementById('dynamic-body');

  if(dynErrors.length === 0) {
    document.getElementById('dynamic-count').textContent = 'Passed';
    const windowsOnlyRules = ['CLM004','CLM005','CLM008','CLM010','CLM016','CLM018','CLM019','CLM025','CLM031'];
    const missed = findings.filter(f => windowsOnlyRules.includes(f.rule_id));
    let gapHtml = '';
    if(missed.length > 0) {
      gapHtml = `<div class="gap-warning"><strong>&#9888; Platform gap:</strong> ${missed.length} static finding${missed.length!==1?'s':''} flagged above would be blocked by <strong>Windows WDAC CLM</strong> but passed here because Linux constrained runspace is more permissive.<ul>${missed.map(f=>`<li><strong>${e(f.rule_id)}</strong>: ${e(f.rule_name)} (line ${f.line})</li>`).join('')}</ul><span class="gap-tip">Trust the static analysis for Windows WDAC deployment decisions.</span></div>`;
    }
    body.innerHTML = `<div class="clm-pass-box"><div class="check">&#10003;</div><h3 style="color:var(--ms-green);font-size:16px;margin-bottom:4px">Dynamic CLM Test Passed</h3><p>Script executed in a ConstrainedLanguage runspace with 0 errors.</p></div>${gapHtml}`;
  } else {
    document.getElementById('dynamic-count').textContent = dynErrors.length + ' error' + (dynErrors.length!==1?'s':'');
    let html = '<table><thead><tr><th style="width:100px">Status</th><th style="width:50px">Line</th><th>Error</th><th>Code</th></tr></thead><tbody>';
    dynErrors.forEach(err => {
      html += `<tr><td><span class="badge ${err.blocked?'blocked':'error'}">${err.blocked?'CLM Blocked':'Error'}</span></td>`
        + `<td style="font-family:var(--font-mono);color:var(--text-dim)">${err.line||'-'}</td>`
        + `<td>${e(err.error)}</td>`
        + `<td>${err.codeSnippet?`<div class="code-snippet">${e(err.codeSnippet)}</div>`:''}</td></tr>`;
    });
    html += '</tbody></table>';
    body.innerHTML = html;
  }
}

// WDAC hash
if(data.wdac_hash && data.wdac_hash.sha256) {
  document.getElementById('wdac-section').style.display = '';
  document.getElementById('wdac-body').innerHTML = `
    <div class="wdac-box">
      <div class="wdac-icon">&#128274;</div>
      <div class="wdac-content">
        <h3>WDAC SHA256 Hash</h3>
        <p>${e(data.wdac_hash.instruction)}</p>
        <div class="wdac-hash">${data.wdac_hash.sha256}</div>
      </div>
    </div>`;
}

// Source code with flagged lines
if(data._source) {
  document.getElementById('source-section').style.display = '';
  const lines = data._source.split('\n');
  document.getElementById('source-count').textContent = lines.length + ' lines';
  const flaggedLines = new Set(findings.map(f => f.line));
  const code = document.getElementById('source-code');
  lines.forEach((line, i) => {
    const span = document.createElement('span');
    span.className = 'source-line' + (flaggedLines.has(i+1) ? ' flagged' : '');
    span.textContent = line;
    code.appendChild(span);
  });
}
</script>
</body>
</html>
