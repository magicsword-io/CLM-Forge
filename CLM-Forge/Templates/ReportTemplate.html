<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<style>
:root{
  --ms-green:#10B981;--ms-dark-green:#059669;--ms-orange:#D97706;--ms-yellow:#EAB308;
  --ms-red:#EF4444;--ms-purple:#A78BFA;--ms-blue:#3B82F6;--ms-teal:#14B8A6;
  --bg:#08080A;--surface:#111113;--surface-bright:#141416;--elevated:#18181B;
  --border:rgba(255,255,255,0.04);--border-hover:rgba(255,255,255,0.08);
  --text:rgba(255,255,255,0.87);--text-muted:rgba(255,255,255,0.50);--text-dim:rgba(255,255,255,0.28);
  --font-display:'Geist','Inter Tight',system-ui,sans-serif;
  --font-body:'Inter Tight',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'Geist Mono','Cascadia Code','Fira Code',Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;font-size:13px;font-weight:500}
.container{max-width:1400px;margin:0 auto;padding:24px}
header{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:32px;margin-bottom:24px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
.header-left h1{font-family:var(--font-display);color:var(--ms-green);font-size:24px;font-weight:700;margin-bottom:4px;letter-spacing:-0.5px;line-height:1.2}
.header-left .tagline{color:var(--text-dim);font-size:13px;font-style:italic}
.header-right{text-align:right}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.meta-item{font-size:12px;color:var(--text-muted)}
.meta-item strong{color:var(--text);font-weight:600}

.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px 16px;text-align:center;transition:border-color 0.15s}
.summary-card:hover{border-color:var(--border-hover)}
.summary-card .num{font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1.2;letter-spacing:-0.5px}
.summary-card .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;font-weight:600}
.num.c-total{color:var(--text)}.num.c-pass{color:var(--ms-green)}.num.c-fail{color:var(--ms-red)}
.num.c-warn{color:var(--ms-orange)}.num.c-info{color:var(--ms-blue)}
.num.c-critical{color:var(--ms-red)}.num.c-high{color:var(--ms-orange)}.num.c-medium{color:var(--ms-yellow)}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:6px;padding:6px 14px;color:var(--text-muted);cursor:pointer;font-size:12px;transition:all 0.15s;font-family:var(--font-body);font-weight:500}
.filter-btn:hover,.filter-btn.active{background:rgba(16,185,129,0.06);color:var(--ms-green);border-color:var(--ms-green)}

.category{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden}
.category-header{padding:16px 20px;cursor:pointer;background:var(--surface-bright);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;user-select:none;transition:background 0.15s}
.category-header:hover{background:var(--elevated)}
.category-header h2{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.2px}
.category-header .cat-meta{display:flex;gap:8px;align-items:center}
.count-badge{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 10px;font-size:11px;color:var(--text-dim);font-family:var(--font-mono)}
.chevron{transition:transform 0.2s;color:var(--text-dim);font-size:12px}
.category.collapsed .category-body{display:none}
.category.collapsed .chevron{transform:rotate(-90deg)}
.category-body{padding:0}

table{width:100%;border-collapse:collapse}
th{background:var(--bg);padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);border-bottom:1px solid var(--border);position:sticky;top:0;font-weight:600}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
tr:hover td{background:var(--surface-bright)}

.badge{display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;font-family:var(--font-mono)}
.badge.s-pass{background:rgba(16,185,129,0.06);color:var(--ms-green)}
.badge.s-fail{background:rgba(239,68,68,0.06);color:var(--ms-red)}
.badge.s-warn{background:rgba(217,119,6,0.06);color:var(--ms-orange)}
.badge.s-info{background:rgba(59,130,246,0.06);color:var(--ms-blue)}
.badge.s-error{background:rgba(239,68,68,0.06);color:var(--ms-red)}
.badge.s-skipped{background:rgba(255,255,255,0.02);color:var(--text-dim)}
.badge.v-critical{background:rgba(239,68,68,0.06);color:var(--ms-red)}
.badge.v-high{background:rgba(217,119,6,0.06);color:var(--ms-orange)}
.badge.v-medium{background:rgba(234,179,8,0.06);color:var(--ms-yellow)}
.badge.v-low{background:rgba(59,130,246,0.06);color:var(--ms-blue)}
.badge.v-info{background:rgba(59,130,246,0.06);color:var(--ms-blue)}

.remediation{color:var(--ms-green);font-size:12px;margin-top:4px;padding:6px 10px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.12);border-radius:6px}
.code-snippet{font-family:var(--font-mono);font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;margin-top:4px;max-width:500px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;color:var(--ms-orange)}

footer{text-align:center;padding:24px;color:var(--text-dim);font-size:12px;border-top:1px solid var(--border);margin-top:24px}
@media(max-width:768px){.summary-grid{grid-template-columns:repeat(3,1fr)}.meta-grid{grid-template-columns:1fr}}
@media print{body{background:#fff;color:#000}.container{max-width:100%}header,.category,.summary-card{border-color:#ddd;background:#fff}
.category-header{background:#f5f5f5}h1,.num{color:#000!important}th{background:#f0f0f0}}
</style>
</head>
<body>
<div class="container">
<header>
<div class="header-top">
<div class="header-left">
<h1>{{TITLE}}</h1>
<div class="tagline">From script chaos to enforced trust.</div>
</div>
<div class="header-right">
<div style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">CLM Forge v{{MODULE_VERSION}}</div>
</div>
</div>
<div class="meta-grid">
<div class="meta-item"><strong>Host:</strong> {{HOSTNAME}}</div>
<div class="meta-item"><strong>User:</strong> {{USERNAME}}</div>
<div class="meta-item"><strong>Generated:</strong> {{GENERATED_AT}}</div>
<div class="meta-item"><strong>PowerShell:</strong> {{PS_VERSION}}</div>
<div class="meta-item"><strong>OS:</strong> {{OS_VERSION}}</div>
</div>
</header>

<div id="summary-grid" class="summary-grid"></div>

<div class="filters" id="filters"></div>

<div id="results-container"></div>

<footer>Generated by CLM Forge v{{MODULE_VERSION}} | {{GENERATED_AT}}</footer>
</div>

<script>
const results = {{RESULTS_JSON}};
const summary = {{SUMMARY_JSON}};

const summaryGrid = document.getElementById('summary-grid');
const cards = [
  {label:'Total',num:summary.Total,cls:'c-total'},
  {label:'Pass',num:summary.Pass,cls:'c-pass'},
  {label:'Fail',num:summary.Fail,cls:'c-fail'},
  {label:'Warning',num:summary.Warning,cls:'c-warn'},
  {label:'Critical',num:summary.Critical,cls:'c-critical'},
  {label:'High',num:summary.High,cls:'c-high'},
  {label:'Medium',num:summary.Medium,cls:'c-medium'}
];
cards.forEach(c=>{
  if(c.num===0&&c.label!=='Total'&&c.label!=='Pass')return;
  const d=document.createElement('div');d.className='summary-card';
  d.innerHTML=`<div class="num ${c.cls}">${c.num}</div><div class="label">${c.label}</div>`;
  summaryGrid.appendChild(d);
});

const grouped={};
results.forEach(r=>{
  if(!grouped[r.category])grouped[r.category]=[];
  grouped[r.category].push(r);
});

function sc(s){return 's-'+(s||'info').toLowerCase()}
function vc(s){return 'v-'+(s||'info').toLowerCase()}

const filters=document.getElementById('filters');
let activeFilter='all';
const allBtn=document.createElement('button');allBtn.className='filter-btn active';allBtn.textContent='All';
allBtn.onclick=()=>{activeFilter='all';renderResults();updateFilters()};
filters.appendChild(allBtn);
['Critical','High','Medium','Low'].forEach(sev=>{
  const count=results.filter(r=>r.severity===sev).length;
  if(count===0)return;
  const b=document.createElement('button');b.className='filter-btn';b.textContent=`${sev} (${count})`;
  b.onclick=()=>{activeFilter=sev;renderResults();updateFilters()};
  filters.appendChild(b);
});
function updateFilters(){filters.querySelectorAll('.filter-btn').forEach((b,i)=>{
  b.classList.toggle('active',i===0?activeFilter==='all':b.textContent.startsWith(activeFilter))
})}

function renderResults(){
  const container=document.getElementById('results-container');container.innerHTML='';
  Object.keys(grouped).forEach(cat=>{
    let items=grouped[cat];
    if(activeFilter!=='all')items=items.filter(r=>r.severity===activeFilter);
    if(items.length===0)return;

    const section=document.createElement('div');section.className='category';
    const header=document.createElement('div');header.className='category-header';
    header.innerHTML=`<h2>${esc(cat)}</h2><div class="cat-meta"><span class="count-badge">${items.length} check${items.length!==1?'s':''}</span><span class="chevron">&#9660;</span></div>`;
    header.onclick=()=>section.classList.toggle('collapsed');
    section.appendChild(header);

    const body=document.createElement('div');body.className='category-body';
    const table=document.createElement('table');
    table.innerHTML='<thead><tr><th>Status</th><th>Severity</th><th>Test</th><th>Message</th><th>Details</th></tr></thead>';
    const tbody=document.createElement('tbody');

    items.forEach(r=>{
      const tr=document.createElement('tr');
      let detailsHtml='';
      if(r.remediation)detailsHtml+=`<div class="remediation">${esc(r.remediation)}</div>`;
      if(r.details&&r.details.CodeSnippet)detailsHtml+=`<div class="code-snippet">${esc(r.details.CodeSnippet)}</div>`;
      if(r.details&&r.details.Line)detailsHtml+=`<div style="font-size:11px;color:var(--text-dim);margin-top:2px;font-family:var(--font-mono)">Line ${r.details.Line}</div>`;
      if(r.details&&r.details.sha256)detailsHtml+=`<div style="margin-top:6px;padding:8px 10px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.12);border-radius:6px;font-family:var(--font-mono);font-size:12px;color:var(--ms-green);word-break:break-all"><strong>SHA256:</strong> ${esc(r.details.sha256)}</div>`;

      tr.innerHTML=`<td><span class="badge ${sc(r.status)}">${esc(r.status)}</span></td><td><span class="badge ${vc(r.severity)}">${esc(r.severity)}</span></td><td style="font-family:var(--font-mono);font-size:12px">${esc(r.testName)}</td><td>${esc(r.message)}</td><td>${detailsHtml}</td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);body.appendChild(table);section.appendChild(body);
    container.appendChild(section);
  });
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
renderResults();
</script>
</body>
</html>
